name: MSRC OSDU SPI local action secret lab

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  java-build-equivalent:
    name: PR-head checkout then local action with trusted env
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head by SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Run PR-controlled local action with source-equivalent trusted inputs
        uses: ./.github/actions/java-build
        env:
          MAVEN_USERNAME: lab-user-${{ github.run_id }}
          MAVEN_TOKEN: lab-maven-token-${{ github.run_id }}
        with:
          gitlab_token: lab-gitlab-token-${{ github.run_id }}
          maven_profile: core,azure
          generate_coverage: false

      - name: Upload marker from local action
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msrc-osdu-spi-local-action-marker
          path: msrc-osdu-spi-marker.txt
          if-no-files-found: warn
