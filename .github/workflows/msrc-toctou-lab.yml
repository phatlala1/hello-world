name: MSRC TOCTOU lab

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  refs-pull-merge-toctou:
    runs-on: ubuntu-latest
    steps:
      - name: Gate snapshot before delay
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "pr_number=${{ github.event.pull_request.number }}"
          echo "event_head_sha=${{ github.event.pull_request.head.sha }}"
          echo "event_head_ref=${{ github.event.pull_request.head.ref }}"
          echo "event_head_repo=${{ github.event.pull_request.head.repo.full_name }}"
          echo "Sleeping so caller can move the PR branch after this event snapshot."
          sleep 90

      - name: Checkout moving refs/pull merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false

      - name: Show checked-out content after delay
        run: |
          echo "approved_sha_from_event=${{ github.event.pull_request.head.sha }}"
          echo "checked_out_commit=$(git rev-parse HEAD)"
          echo "checked_out_second_parent=$(git rev-parse HEAD^2 2>/dev/null || true)"
          echo "marker_content=$(cat msrc-toctou-marker.txt)"
          echo "marker_sha256=$(sha256sum msrc-toctou-marker.txt | awk '{print $1}')"
          git log --oneline --parents -1
