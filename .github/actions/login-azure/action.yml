name: Local Azure login action
description: Owned replica of Tyger-style local login action. Safe lab only.

runs:
  using: composite
  steps:
    - name: Validate requested auth mode
      shell: bash
      run: |
        set -euo pipefail
        case "${LAB_AUTH_MODE:-OIDC}" in
          OIDC|IDENTITY) ;;
          *) echo "Unsupported LAB_AUTH_MODE=${LAB_AUTH_MODE}" >&2; exit 2 ;;
        esac

    - name: Azure login via OIDC
      if: ${{ env.LAB_AUTH_MODE == 'OIDC' }}
      uses: azure/login@v3
      with:
        client-id: ${{ env.AZURE_CLIENT_ID }}
        tenant-id: ${{ env.AZURE_TENANT_ID }}
        subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

    - name: Azure login via managed identity
      if: ${{ env.LAB_AUTH_MODE == 'IDENTITY' }}
      shell: bash
      run: |
        set -euo pipefail
        az login --identity --username "$AZURE_CLIENT_ID" --output none

    - name: Prefetch token cache without printing tokens
      shell: bash
      run: |
        set -euo pipefail
        az account get-access-token --output none
